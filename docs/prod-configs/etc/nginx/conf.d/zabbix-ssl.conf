server {
        listen          443 ssl default_server;
        server_name     zabbix-paranagua.porto-pactual.net;
        ssl                     on;
        ssl_certificate         /etc/zabbix/ssl/zabbix-paranagua.porto-pactual.net.cer;
        ssl_certificate_key     /etc/zabbix/ssl/zabbix-paranagua.porto-pactual.net.key;
        root    /usr/share/zabbix;
        index   index.php;

        location = /favicon.ico {
                log_not_found   off;
        }

        location ^~ /zbxportal {
                rewrite ^/zbxportal/?(.*)$ /$1 break;
                proxy_pass http://localhost:3001;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
        }

        location ^~ /api/ {
                proxy_pass http://localhost:3001;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
        }

        gzip on;
        gzip_types text/plain application/javascript text/css application/json;

        location ^~ /portal {
                index index.html;
                alias /opt/zabbix-portal/frontend/dist/;
                try_files $uri $uri/ /portal/index.html;
        }

        location /repo/download-agent {
                alias /etc/zabbix/web/repo/download-agent/;
                autoindex on;
        }

        location / {
                try_files       $uri $uri/ =404;
        }

        location /assets {
                access_log      off;
                expires         10d;
        }

        location ~ /\.ht {
                deny            all;
        }

        location ~ /(api\/|conf[^\.]|include|locale) {
                deny            all;
                return          404;
        }

        location /vendor {
                deny            all;
                return          404;
        }

        location ~ [^/]\.php(/|$) {
                fastcgi_pass    unix:/var/run/php/zabbix.sock;
                fastcgi_split_path_info ^(.+\.php)(/.+)$;
                fastcgi_index   index.php;
                fastcgi_param   DOCUMENT_ROOT   /usr/share/zabbix;
                fastcgi_param   SCRIPT_FILENAME /usr/share/zabbix$fastcgi_script_name;
                fastcgi_param   PATH_TRANSLATED /usr/share/zabbix$fastcgi_script_name;
                include fastcgi_params;
                fastcgi_param   QUERY_STRING    $query_string;
                fastcgi_param   REQUEST_METHOD  $request_method;
                fastcgi_param   CONTENT_TYPE    $content_type;
                fastcgi_param   CONTENT_LENGTH  $content_length;
                fastcgi_intercept_errors        on;
                fastcgi_ignore_client_abort     off;
                fastcgi_connect_timeout         60;
                fastcgi_send_timeout            180;
                fastcgi_read_timeout            180;
                fastcgi_buffer_size             128k;
                fastcgi_buffers                 4 256k;
                fastcgi_busy_buffers_size       256k;
                fastcgi_temp_file_write_size    256k;
        }
}
