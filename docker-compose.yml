services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zabbix-portal-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ZABBIX_URL=${ZABBIX_URL}
      - ZABBIX_USER=${ZABBIX_USER}
      - ZABBIX_PASSWORD=${ZABBIX_PASSWORD}
      - ZABBIX_TOKEN=${ZABBIX_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - portal-db:/app/db
      - portal-uploads:/app/uploads
    networks:
      - portal-net
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zabbix-portal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portal-net
    ports:
      - "8080:80"

volumes:
  portal-db:
  portal-uploads:

networks:
  portal-net:
    driver: bridge
